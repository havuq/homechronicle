version: 2
updates:
  - package-ecosystem: npm
    directory: /listener
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      listener-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      listener-major:
        patterns:
          - "*"
        update-types:
          - major
    labels:
      - dependencies
      - security

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      web-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      web-major:
        patterns:
          - "*"
        update-types:
          - major
    labels:
      - dependencies
      - security

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      github-actions-all:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
