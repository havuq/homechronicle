name: Cache Maintenance

on:
  schedule:
    - cron: "17 4 * * 0"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  prune-buildkit-caches:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale BuildKit caches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxAgeDays = 7;
            const cutoffMs = maxAgeDays * 24 * 60 * 60 * 1000;
            const now = Date.now();
            const buildkitKeyPattern = /^(buildkit-blob-|index-)/;

            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              { owner, repo, per_page: 100 },
              (response) => response.data.actions_caches
            );

            const staleCaches = caches.filter((cache) => {
              if (!buildkitKeyPattern.test(cache.key)) return false;
              const lastAccessedAt = Date.parse(cache.last_accessed_at || cache.created_at);
              return Number.isFinite(lastAccessedAt) && (now - lastAccessedAt) > cutoffMs;
            });

            core.info(
              `Found ${caches.length} total caches. Deleting ${staleCaches.length} stale BuildKit caches (>${maxAgeDays} days).`
            );

            for (const cache of staleCaches) {
              await github.rest.actions.deleteActionsCacheById({
                owner,
                repo,
                cache_id: cache.id,
              });
              core.info(`Deleted ${cache.id} (${cache.key}).`);
            }
