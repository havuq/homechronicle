services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homekit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-homekit_events}
      TZ: ${TZ:-UTC}
    volumes:
      - ${POSTGRES_DATA_SOURCE:-postgres-data}:/var/lib/postgresql/data
      # Keep schema bootstrap for first-time DB creation.
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-homekit} -d ${POSTGRES_DB:-homekit_events}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  listener:
    image: ${LISTENER_IMAGE:-ghcr.io/havuq/homechronicle/listener:latest}
    restart: unless-stopped
    # Host networking is recommended for HomeKit/mDNS discovery on Linux hosts.
    network_mode: ${LISTENER_NETWORK_MODE:-host}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-homekit}:${POSTGRES_PASSWORD:-changeme}@127.0.0.1:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-homekit_events}}
      API_PORT: ${API_PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
      API_TOKEN: ${API_TOKEN:-}
      TZ: ${TZ:-UTC}
      ALERTS_ENABLED: ${ALERTS_ENABLED:-false}
    volumes:
      - ${LISTENER_DATA_SOURCE:-listener-data}:/app/data
      # Let libdns_sd in the container talk to host avahi-daemon over D-Bus.
      - ${HOST_DBUS_SOCKET:-/run/dbus/system_bus_socket}:/run/dbus/system_bus_socket:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "const http=require('http');const port=process.env.API_PORT||3001;
          const req=http.get({host:'127.0.0.1',port,path:'/api/health',timeout:5000},
          (res)=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));
          req.on('timeout',()=>{req.destroy();process.exit(1);});"
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 30s

  web:
    image: ${WEB_IMAGE:-ghcr.io/havuq/homechronicle/web:latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LISTENER_HOST: ${LISTENER_HOST:-host.docker.internal}
      LISTENER_PORT: ${LISTENER_PORT:-${API_PORT:-3001}}
      API_TOKEN: ${API_TOKEN:-}
      TZ: ${TZ:-UTC}

volumes:
  postgres-data:
  listener-data:
