services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-UTC}
    volumes:
      - ${POSTGRES_DATA_SOURCE:-postgres-data}:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  listener:
    image: ghcr.io/havuq/homechronicle/listener:latest
    restart: unless-stopped
    env_file:
      - ../.env
    network_mode: host
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}
      API_PORT: ${API_PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
      API_TOKEN: ${API_TOKEN:-}
      TZ: ${TZ:-UTC}
    volumes:
      - ${LISTENER_DATA_SOURCE:-../listener/data}:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "const http=require('http');const port=process.env.API_PORT||3001;
          const req=http.get({host:'127.0.0.1',port,path:'/api/health',timeout:5000},
          (res)=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));
          req.on('timeout',()=>{req.destroy();process.exit(1);});"
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 30s

  web:
    image: ghcr.io/havuq/homechronicle/web:latest
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LISTENER_HOST: ${LISTENER_HOST:-host.docker.internal}
      LISTENER_PORT: ${LISTENER_PORT:-${API_PORT:-3001}}
      API_TOKEN: ${API_TOKEN:-}
      TZ: ${TZ:-UTC}

volumes:
  postgres-data:
  listener-data:
